<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meetings | AMCAG Member Portal</title>
  <link rel="stylesheet" href="/css/material-you.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/mobile.css">
  <style>
    .meeting-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
    }
    .meeting-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .meeting-status {
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .meeting-status.live {
      background: #4caf50;
      color: white;
    }
    .meeting-status.upcoming {
      background: #2196f3;
      color: white;
    }
    .meeting-status.ended {
      background: #9e9e9e;
      color: white;
    }
    #jitsiContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      display: none;
    }
    #jitsiFrame {
      width: 100%;
      height: 100%;
      border: none;
    }
    .close-meeting-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 10001;
      background: #f44336;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
    }
  </style>
</head>
<body class="dashboard-layout">
  <nav class="navbar">
    <div class="navbar-container">
      <a href="/member-dashboard.html" class="navbar-logo">
        <img src="/images/logo.jpg" alt="AMCAG Logo">
        <span>AMCAG Member Portal</span>
      </a>
      <div class="navbar-actions">
        <button class="btn btn-sm" onclick="signOut()">Sign Out</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-container">
    <aside class="dashboard-sidebar">
      <nav class="dashboard-nav">
        <a href="/member-dashboard.html" class="dashboard-nav-item">
          <span>📊</span> Dashboard
        </a>
        <a href="/member-dashboard/profile.html" class="dashboard-nav-item">
          <span>👤</span> My Profile
        </a>
        <a href="/member-dashboard/dues-payment.html" class="dashboard-nav-item">
          <span>💳</span> Pay Dues
        </a>
        <a href="/member-dashboard/donate.html" class="dashboard-nav-item">
          <span>💰</span> Donate
        </a>
        <a href="/member-dashboard/my-donations.html" class="dashboard-nav-item">
          <span>📜</span> My Donations
        </a>
        <a href="/member-dashboard/meetings.html" class="dashboard-nav-item active">
          <span>📹</span> Meetings
        </a>
        <a href="/member-dashboard/waiver-request.html" class="dashboard-nav-item">
          <span>📝</span> Request Waiver
        </a>
        <a href="/member-dashboard/certificates.html" class="dashboard-nav-item">
          <span>🎓</span> Certificates
        </a>
      </nav>
    </aside>

    <main class="dashboard-content">
      <div class="dashboard-header">
        <div>
          <h1 class="dashboard-title">Meetings</h1>
          <p class="dashboard-subtitle">Join upcoming meetings and view recordings</p>
        </div>
      </div>

      <!-- Live Meetings -->
      <div class="card mb-4" id="liveMeetingsSection" style="display: none;">
        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
          <div style="width: 8px; height: 8px; background: #4caf50; border-radius: 50%; animation: pulse 2s infinite;"></div>
          <h3 class="card-title" style="margin: 0;">Live Now</h3>
        </div>
        <div id="liveMeetingsList"></div>
      </div>

      <!-- Upcoming Meetings -->
      <div class="card mb-4">
        <h3 class="card-title mb-4">Upcoming Meetings</h3>
        <div id="upcomingMeetingsList">
          <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
            Loading meetings...
          </div>
        </div>
      </div>

      <!-- Past Meetings -->
      <div class="card">
        <h3 class="card-title mb-4">Past Meetings</h3>
        <div id="pastMeetingsList">
          <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
            Loading meetings...
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Meeting Notes Modal -->
  <div id="notesModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;">
    <div class="card" style="max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h3 id="notesModalTitle">Meeting Notes</h3>
        <button class="btn btn-sm btn-outline" onclick="closeNotesModal()">✕ Close</button>
      </div>
      
      <!-- Add Note Form -->
      <div class="card" style="background: var(--color-neutral-95); margin-bottom: 1rem;">
        <form id="addNoteForm">
          <div class="form-group">
            <textarea id="noteContent" class="form-input" rows="4" placeholder="Add your notes here..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">💾 Save Note</button>
        </form>
      </div>

      <!-- Notes List -->
      <div id="notesList">
        <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
          Loading notes...
        </div>
      </div>
    </div>
  </div>

  <!-- Jitsi Meeting Container -->
  <div id="jitsiContainer">
    <button class="close-meeting-btn" onclick="leaveMeeting()">✕ Leave Meeting</button>
    <iframe id="jitsiFrame" allow="camera; microphone; fullscreen; display-capture; autoplay"></iframe>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/suspension-check.js"></script>

  <script>
    let currentUser = null;
    let userProfile = null;

    function signOut() {
      AuthModule.signOut();
    }

    async function loadMeetings() {
      try {
        const db = firebase.firestore();
        const now = new Date();

        // Get meetings user has access to
        const snapshot = await db.collection('meetings')
          .where('visibility', 'in', ['public', 'members', userProfile.region])
          .orderBy('scheduledTime', 'desc')
          .get();

        const meetings = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data(),
          scheduledTime: doc.data().scheduledTime?.toDate()
        }));

        // Categorize meetings
        const liveMeetings = meetings.filter(m => isLive(m));
        const upcomingMeetings = meetings.filter(m => isUpcoming(m));
        const pastMeetings = meetings.filter(m => isPast(m));

        // Render
        renderLiveMeetings(liveMeetings);
        renderUpcomingMeetings(upcomingMeetings);
        renderPastMeetings(pastMeetings);

      } catch (error) {
        console.error('Error loading meetings:', error);
        UIModule.showAlert('Error loading meetings: ' + error.message, 'error');
      }
    }

    function isLive(meeting) {
      if (!meeting.scheduledTime) return false;
      const now = new Date();
      const end = new Date(meeting.scheduledTime.getTime() + (meeting.duration || 60) * 60000);
      return now >= meeting.scheduledTime && now <= end;
    }

    function isUpcoming(meeting) {
      if (!meeting.scheduledTime) return false;
      return new Date() < meeting.scheduledTime;
    }

    function isPast(meeting) {
      if (!meeting.scheduledTime) return false;
      const end = new Date(meeting.scheduledTime.getTime() + (meeting.duration || 60) * 60000);
      return new Date() > end;
    }

    function renderLiveMeetings(meetings) {
      const section = document.getElementById('liveMeetingsSection');
      const container = document.getElementById('liveMeetingsList');

      if (meetings.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      container.innerHTML = meetings.map(meeting => `
        <div class="meeting-card" style="border: 2px solid #4caf50;">
          <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
            <div style="flex: 1;">
              <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                <span class="meeting-status live">🔴 LIVE</span>
                ${meeting.type === 'regional' ? '<span class="badge badge-secondary">Regional</span>' : ''}
                ${meeting.type === 'national' ? '<span class="badge badge-primary">National</span>' : ''}
                ${meeting.type === 'general' ? '<span class="badge">General</span>' : ''}
              </div>
              <h4 style="margin: 0 0 0.5rem 0;">${meeting.title}</h4>
              <p style="color: var(--text-secondary); margin: 0; font-size: 0.875rem;">${meeting.description || ''}</p>
            </div>
            <button class="btn btn-success" onclick="joinMeeting('${meeting.id}', '${meeting.title}')">
              🎥 Join Now
            </button>
          </div>
          <div style="display: flex; gap: 1rem; font-size: 0.875rem; color: var(--text-secondary);">
            <span>👤 ${meeting.participants || 0} participants</span>
            <span>👨‍💼 Host: ${meeting.hostName}</span>
          </div>
        </div>
      `).join('');
    }

    function renderUpcomingMeetings(meetings) {
      const container = document.getElementById('upcomingMeetingsList');

      if (meetings.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 2rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">📅</div>
            <p style="color: var(--text-secondary);">No upcoming meetings scheduled</p>
          </div>
        `;
        return;
      }

      container.innerHTML = meetings.map(meeting => `
        <div class="meeting-card mb-3">
          <div style="display: flex; justify-content: space-between; align-items: start;">
            <div style="flex: 1;">
              <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                <span class="meeting-status upcoming">UPCOMING</span>
                ${meeting.type === 'regional' ? '<span class="badge badge-secondary">Regional</span>' : ''}
                ${meeting.type === 'national' ? '<span class="badge badge-primary">National</span>' : ''}
              </div>
              <h4 style="margin: 0 0 0.5rem 0;">${meeting.title}</h4>
              <p style="color: var(--text-secondary); margin: 0 0 0.5rem 0; font-size: 0.875rem;">${meeting.description || ''}</p>
              <div style="display: flex; gap: 1rem; font-size: 0.875rem; color: var(--text-secondary);">
                <span>📅 ${formatDate(meeting.scheduledTime)}</span>
                <span>⏰ ${formatTime(meeting.scheduledTime)}</span>
                <span>⏱️ ${meeting.duration || 60} mins</span>
                <span>👨‍💼 ${meeting.hostName}</span>
              </div>
            </div>
            <button class="btn btn-outline" onclick="downloadCalendar('${meeting.id}', '${meeting.title}', '${meeting.scheduledTime}', ${meeting.duration})">
              📅 Download Calendar
            </button>
          </div>
        </div>
      `).join('');
    }

    function renderPastMeetings(meetings) {
      const container = document.getElementById('pastMeetingsList');

      if (meetings.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 2rem;">
            <p style="color: var(--text-secondary);">No past meetings</p>
          </div>
        `;
        return;
      }

      container.innerHTML = meetings.slice(0, 10).map(meeting => `
        <div class="meeting-card mb-3">
          <div style="display: flex; justify-content: space-between; align-items: start;">
            <div style="flex: 1;">
              <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                <span class="meeting-status ended">ENDED</span>
                ${meeting.recordingUrl ? '<span class="badge badge-success">📹 Recorded</span>' : ''}
              </div>
              <h4 style="margin: 0 0 0.5rem 0;">${meeting.title}</h4>
              <div style="display: flex; gap: 1rem; font-size: 0.875rem; color: var(--text-secondary);">
                <span>📅 ${formatDate(meeting.scheduledTime)}</span>
                <span>👥 ${meeting.participantCount || 0} attended</span>
              </div>
            </div>
            <div style="display: flex; gap: 0.5rem;">
              ${meeting.recordingUrl ? `
                <button class="btn btn-outline" onclick="window.open('${meeting.recordingUrl}', '_blank')">
                  ▶️ Watch Recording
                </button>
              ` : ''}
              <button class="btn btn-outline" onclick="showNotesModal('${meeting.id}', '${meeting.title}')">
                📝 Notes
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function joinMeeting(meetingId, meetingTitle) {
      const roomName = `amcag-${meetingId}`;
      const displayName = userProfile.fullName || 'AMCAG Member';
      const userEmail = userProfile.email || '';
      
      // Construct Jitsi Meet URL with recording enabled
      const jitsiUrl = `https://meet.jit.si/${roomName}#config.prejoinPageEnabled=false&config.startWithAudioMuted=true&config.startWithVideoMuted=false&config.fileRecordingsEnabled=true&config.dropbox.appKey=YOUR_DROPBOX_KEY&userInfo.displayName=${encodeURIComponent(displayName)}&userInfo.email=${encodeURIComponent(userEmail)}`;

      // Show meeting container
      document.getElementById('jitsiFrame').src = jitsiUrl;
      document.getElementById('jitsiContainer').style.display = 'block';
      document.body.style.overflow = 'hidden';

      // Track attendance
      trackAttendance(meetingId, 'joined');
      
      // Update participant count
      incrementParticipantCount(meetingId);
    }

    let currentMeetingId = null;

    function leaveMeeting() {
      // Track attendance on leave
      if (currentMeetingId) {
        trackAttendance(currentMeetingId, 'left');
        currentMeetingId = null;
      }
      
      document.getElementById('jitsiFrame').src = '';
      document.getElementById('jitsiContainer').style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    async function incrementParticipantCount(meetingId) {
      try {
        const db = firebase.firestore();
        await db.collection('meetings').doc(meetingId).update({
          participants: firebase.firestore.FieldValue.increment(1),
          lastJoinedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      } catch (error) {
        console.error('Error updating participant count:', error);
      }
    }

    async function trackAttendance(meetingId, action) {
      try {
        const db = firebase.firestore();
        await db.collection('meeting_attendance').add({
          meetingId,
          userId: currentUser.uid,
          userName: userProfile.fullName,
          userEmail: userProfile.email,
          action, // 'joined' or 'left'
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        if (action === 'joined') {
          currentMeetingId = meetingId;
        }
      } catch (error) {
        console.error('Error tracking attendance:', error);
      }
    }

    function downloadCalendar(meetingId, title, scheduledTime, duration) {
      const start = new Date(scheduledTime);
      const end = new Date(start.getTime() + duration * 60000);
      
      const formatDate = (date) => {
        return date.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      };

      const icsContent = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//AMCAG//Meeting//EN',
        'BEGIN:VEVENT',
        `UID:${meetingId}@amcag-website.web.app`,
        `DTSTAMP:${formatDate(new Date())}`,
        `DTSTART:${formatDate(start)}`,
        `DTEND:${formatDate(end)}`,
        `SUMMARY:${title}`,
        `DESCRIPTION:Join AMCAG meeting: https://amcag-website.web.app/member-dashboard/meetings.html`,
        `LOCATION:https://meet.jit.si/amcag-${meetingId}`,
        'STATUS:CONFIRMED',
        'END:VEVENT',
        'END:VCALENDAR'
      ].join('\r\n');

      const blob = new Blob([icsContent], { type: 'text/calendar' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `amcag-meeting-${meetingId}.ics`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      
      UIModule.showAlert('📅 Calendar file downloaded!', 'success');
    }

    function formatDate(date) {
      if (!date) return 'N/A';
      return new Intl.DateTimeFormat('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      }).format(date);
    }

    function formatTime(date) {
      if (!date) return 'N/A';
      return new Intl.DateTimeFormat('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: true
      }).format(date);
    }

    // Pulse animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    `;
    document.head.appendChild(style);

    // ===== MEETING NOTES FUNCTIONS =====
    let currentNoteMeetingId = null;

    function showNotesModal(meetingId, meetingTitle) {
      currentNoteMeetingId = meetingId;
      document.getElementById('notesModalTitle').textContent = `Notes: ${meetingTitle}`;
      document.getElementById('notesModal').style.display = 'flex';
      loadMeetingNotes(meetingId);
    }

    function closeNotesModal() {
      document.getElementById('notesModal').style.display = 'none';
      document.getElementById('addNoteForm').reset();
      currentNoteMeetingId = null;
    }

    async function loadMeetingNotes(meetingId) {
      try {
        const db = firebase.firestore();
        const notesSnapshot = await db.collection('meeting_notes')
          .where('meetingId', '==', meetingId)
          .orderBy('createdAt', 'desc')
          .get();

        const container = document.getElementById('notesList');

        if (notesSnapshot.empty) {
          container.innerHTML = `
            <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
              <p>No notes yet. Add your first note above!</p>
            </div>
          `;
          return;
        }

        container.innerHTML = notesSnapshot.docs.map(doc => {
          const note = doc.data();
          const createdAt = note.createdAt?.toDate();
          const isOwner = note.userId === currentUser.uid;

          return `
            <div class="card mb-3" style="background: ${isOwner ? 'var(--color-primary-95)' : 'white'};">
              <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                <div>
                  <strong>${note.userName}</strong>
                  <span style="color: var(--text-secondary); font-size: 0.875rem; margin-left: 0.5rem;">
                    ${createdAt ? createdAt.toLocaleString() : 'Just now'}
                  </span>
                </div>
                ${isOwner ? `
                  <button class="btn btn-sm btn-outline" onclick="deleteNote('${doc.id}')" style="color: #f44336;">Delete</button>
                ` : ''}
              </div>
              <p style="margin: 0; white-space: pre-wrap;">${note.content}</p>
            </div>
          `;
        }).join('');
      } catch (error) {
        console.error('Error loading notes:', error);
        UIModule.showAlert('Error loading notes: ' + error.message, 'error');
      }
    }

    document.getElementById('addNoteForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const content = document.getElementById('noteContent').value.trim();
      if (!content || !currentNoteMeetingId) return;

      try {
        const db = firebase.firestore();
        await db.collection('meeting_notes').add({
          meetingId: currentNoteMeetingId,
          userId: currentUser.uid,
          userName: userProfile.fullName,
          userEmail: userProfile.email,
          content,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        document.getElementById('noteContent').value = '';
        UIModule.showAlert('✅ Note saved!', 'success');
        loadMeetingNotes(currentNoteMeetingId);
      } catch (error) {
        console.error('Error saving note:', error);
        UIModule.showAlert('Error saving note: ' + error.message, 'error');
      }
    });

    async function deleteNote(noteId) {
      if (!confirm('Delete this note?')) return;

      try {
        const db = firebase.firestore();
        await db.collection('meeting_notes').doc(noteId).delete();
        UIModule.showAlert('Note deleted', 'success');
        loadMeetingNotes(currentNoteMeetingId);
      } catch (error) {
        console.error('Error deleting note:', error);
        UIModule.showAlert('Error deleting note: ' + error.message, 'error');
      }
    }

    // Initialize
    AuthModule.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = '/membership.html';
        return;
      }

      currentUser = user;

      try {
        const db = firebase.firestore();
        const userDoc = await db.collection('users').doc(user.uid).get();
        userProfile = userDoc.data();

        loadMeetings();

        // Refresh every 30 seconds to check for new live meetings
        setInterval(loadMeetings, 30000);
      } catch (error) {
        console.error('Error loading profile:', error);
      }
    });

    // Handle escape key to leave meeting
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('jitsiContainer').style.display === 'block') {
        leaveMeeting();
      }
    });
  </script>
  <script src="/js/mobile-menu.js"></script>
</body>
</html>
