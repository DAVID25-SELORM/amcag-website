<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Certificates | AMCAG Member Portal</title>
  <link rel="stylesheet" href="/css/material-you.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/mobile.css?v=20260524-dropdown5">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-layout">
  <nav class="navbar">
    <div class="navbar-container">
      <a href="/member-dashboard.html" class="navbar-logo">
        <img src="/images/logo.jpg" alt="AMCAG Logo">
        <span>AMCAG Member Portal</span>
      </a>
      <div class="navbar-actions">
        <button class="btn btn-sm btn-outline" onclick="signOut()">Sign Out</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-container">
    <aside class="dashboard-sidebar">
      <nav class="dashboard-nav">
        <a href="/member-dashboard.html" class="dashboard-nav-item">
          <span>📊</span> Dashboard
        </a>
        <a href="/profile.html" class="dashboard-nav-item">
          <span>👤</span> My Profile
        </a>
        <a href="/certificates.html" class="dashboard-nav-item active">
          <span>📜</span> Certificates
        </a>
        <a href="/dues.html" class="dashboard-nav-item">
          <span>💳</span> Dues Payment
        </a>
        <a href="/payments.html" class="dashboard-nav-item">
          <span>💰</span> Payment History
        </a>
      </nav>
    </aside>

    <main class="dashboard-content">
      <div class="dashboard-header">
        <h1 class="dashboard-title">My Certificates</h1>
        <p class="dashboard-subtitle">View and download your professional certificates</p>
      </div>

      <div class="grid grid-2 gap-4" id="certificates-list">
        <div class="card" style="grid-column: 1 / -1; text-align: center; padding: var(--space-6); color: var(--text-secondary);">
          Loading your certificates...
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase.js"></script>
  <script src="/js/auth.js?v=20260530-memberportal1"></script>
  <script src="/js/api.js?v=20260526-uid-index"></script>
  <script src="/js/router.js"></script>
  <script src="/js/ui.js"></script>

  <script>
    function signOut() {
      AuthModule.signOut();
    }

    function toDateValue(value) {
      if (!value) return null;
      if (typeof value.toDate === 'function') return value.toDate();
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatDate(value, fallback = 'N/A') {
      const date = toDateValue(value);
      return date ? date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : fallback;
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function escapeJsString(value) {
      return String(value || '').replace(/[\\']/g, '\\$&').replace(/\r?\n/g, ' ');
    }

    function getCertificateId(cert) {
      return cert.certificateId || cert.id;
    }

    function getCertificateTitle(cert) {
      return cert.title || `${cert.type || cert.certificateType || 'Professional'} Certificate`;
    }

    function getStatusBadge(status) {
      const normalized = String(status || 'issued').toLowerCase();
      const badge = normalized === 'revoked' ? 'error' : (normalized === 'pending' ? 'warning' : 'success');
      return `<span class="badge badge-${badge}">${escapeHtml(normalized.charAt(0).toUpperCase() + normalized.slice(1))}</span>`;
    }

    function certificateUrl(cert, print = false) {
      const id = encodeURIComponent(getCertificateId(cert));
      return `/certificate-view.html?id=${id}&from=member${print ? '&print=1' : ''}`;
    }

    function viewCertificate(certId) {
      window.open(`/certificate-view.html?id=${encodeURIComponent(certId)}&from=member`, '_blank', 'noopener');
    }

    function downloadCertificate(certId) {
      window.open(`/certificate-view.html?id=${encodeURIComponent(certId)}&from=member&print=1`, '_blank', 'noopener');
    }

    function renderEmptyState() {
      document.getElementById('certificates-list').innerHTML = `
        <div class="card" style="grid-column: 1 / -1; text-align: center; padding: var(--space-6);">
          <h3 style="margin-bottom: var(--space-2);">No certificates issued yet</h3>
          <p style="color: var(--text-secondary); margin-bottom: var(--space-4);">
            Certificates issued by AMCAG national administrators will appear here when assigned to your account.
          </p>
          <a href="/member-dashboard.html" class="btn btn-outline">Back to Dashboard</a>
        </div>
      `;
    }

    function renderCertificates(certificates) {
      if (!certificates.length) {
        renderEmptyState();
        return;
      }

      document.getElementById('certificates-list').innerHTML = certificates.map((cert) => {
        const certId = getCertificateId(cert);
        const issueDate = cert.issuedAt || cert.issueDate || cert.createdAt;
        const expiryDate = cert.expiryDate || cert.validUntil || cert.expiresAt;
        const typeLabel = cert.type || cert.certificateType || 'Certificate';

        return `
          <div class="card">
            <div class="flex-between mb-3" style="gap: var(--space-2); align-items: flex-start;">
              <h3 class="card-title">${escapeHtml(getCertificateTitle(cert))}</h3>
              ${getStatusBadge(cert.status)}
            </div>
            <div class="mb-3">
              <div style="color: var(--text-secondary); font-size: var(--text-sm); margin-bottom: var(--space-1);">
                <strong>Certificate ID:</strong> ${escapeHtml(certId)}
              </div>
              <div style="color: var(--text-secondary); font-size: var(--text-sm); margin-bottom: var(--space-1);">
                <strong>Issue Date:</strong> ${escapeHtml(formatDate(issueDate))}
              </div>
              <div style="color: var(--text-secondary); font-size: var(--text-sm); margin-bottom: var(--space-1);">
                <strong>Type:</strong> ${escapeHtml(typeLabel)}
              </div>
              <div style="color: var(--text-secondary); font-size: var(--text-sm);">
                <strong>Valid Until:</strong> ${escapeHtml(formatDate(expiryDate, 'No Expiry'))}
              </div>
            </div>
            <div class="flex gap-2" style="flex-wrap: wrap;">
              <button type="button" class="btn btn-sm btn-primary" onclick="downloadCertificate('${escapeJsString(certId)}')">Download PDF</button>
              <button type="button" class="btn btn-sm btn-outline" onclick="viewCertificate('${escapeJsString(certId)}')">View Online</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function queryCertificatesByField(db, field, value) {
      if (!value) return [];
      try {
        const snapshot = await db.collection('certificates').where(field, '==', value).get();
        return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      } catch (error) {
        console.warn(`Certificate query failed for ${field}:`, error);
        return [];
      }
    }

    async function loadCertificates(user) {
      try {
        const db = firebase.firestore();
        const profile = user.profile || {};
        const queries = await Promise.all([
          queryCertificatesByField(db, 'memberUid', user.uid),
          queryCertificatesByField(db, 'memberId', user.uid),
          queryCertificatesByField(db, 'memberId', profile.memberId),
          queryCertificatesByField(db, 'memberEmail', user.email || profile.email)
        ]);

        const byId = new Map();
        queries.flat().forEach((cert) => {
          byId.set(getCertificateId(cert), cert);
        });

        const certificates = Array.from(byId.values()).sort((a, b) => {
          const aTime = (toDateValue(a.issuedAt || a.issueDate || a.createdAt)?.getTime()) || 0;
          const bTime = (toDateValue(b.issuedAt || b.issueDate || b.createdAt)?.getTime()) || 0;
          return bTime - aTime;
        });

        renderCertificates(certificates);
      } catch (error) {
        console.error('Error loading certificates:', error);
        UIModule.showAlert('Error loading certificates: ' + error.message, 'error');
        renderEmptyState();
      }
    }

    AuthModule.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = '/membership.html';
      } else {
        loadCertificates(user);
      }
    });
  </script>
  <script src="/js/mobile-menu.js?v=20260524-dropdown5"></script>
</body>
</html>
