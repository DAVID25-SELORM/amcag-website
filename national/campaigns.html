<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaign Management | National Dashboard</title>
  <link rel="stylesheet" href="/css/material-you.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/mobile.css">
</head>
<body class="dashboard-layout">
  <nav class="navbar">
    <div class="navbar-container">
      <a href="/national/dashboard.html" class="navbar-logo">
        <img src="/images/logo.jpg" alt="AMCAG Logo">
        <span>AMCAG National Dashboard</span>
      </a>
      <div class="navbar-actions">
        <button class="btn btn-sm" onclick="signOut()">Sign Out</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-container">
    <aside class="dashboard-sidebar">
      <nav class="dashboard-nav">
        <a href="/national/dashboard.html" class="dashboard-nav-item">
          <span>📊</span> Dashboard
        </a>
        <a href="/national/members.html" class="dashboard-nav-item">
          <span>👥</span> Members
        </a>
        <a href="/national/analytics.html" class="dashboard-nav-item">
          <span>📈</span> Analytics
        </a>
        <a href="/national/donations-overview.html" class="dashboard-nav-item">
          <span>💰</span> Donations
        </a>
        <a href="/national/campaigns.html" class="dashboard-nav-item active">
          <span>🎯</span> Campaigns
        </a>
      </nav>
    </aside>

    <main class="dashboard-content">
      <div class="dashboard-header mb-6">
        <div>
          <h1 class="dashboard-title">Campaign Management</h1>
          <p class="dashboard-subtitle">Create and manage donation campaigns</p>
        </div>
        <div>
          <button class="btn btn-primary" onclick="openCampaignModal()">➕ New Campaign</button>
        </div>
      </div>

      <!-- Active Campaigns -->
      <div class="card mb-6">
        <h3 class="card-title mb-4">🎯 Active Campaigns</h3>
        <div id="activeCampaigns">
          <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
            Loading campaigns...
          </div>
        </div>
      </div>

      <!-- Completed/Cancelled Campaigns -->
      <div class="card">
        <h3 class="card-title mb-4">📋 Past Campaigns</h3>
        <div style="margin-bottom: 1.5rem;">
          <select id="statusFilter" class="form-input" style="width: auto;">
            <option value="">All Status</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div id="pastCampaigns">
          <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
            Loading past campaigns...
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Campaign Modal -->
  <div id="campaignModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; overflow-y: auto; padding: 2rem;">
    <div class="card" style="max-width: 700px; width: 90%;">
      <div style="padding: 2rem;">
        <h3 style="margin-bottom: 1.5rem;" id="modalTitle">Create New Campaign</h3>
        
        <form onsubmit="submitCampaign(event)">
          <input type="hidden" id="campaignId">
          
          <div class="form-group">
            <label for="campaignTitle" class="form-label required">Campaign Title</label>
            <input type="text" id="campaignTitle" class="form-input" required placeholder="e.g., Christmas Orphanage Outreach 2026">
          </div>

          <div class="form-group">
            <label for="campaignDescription" class="form-label required">Description</label>
            <textarea id="campaignDescription" class="form-input" rows="4" required placeholder="Describe the purpose and goals of this campaign..."></textarea>
          </div>

          <div class="grid grid-2 gap-4">
            <div class="form-group">
              <label for="campaignGoal" class="form-label">Target Amount (GHS)</label>
              <input type="number" id="campaignGoal" class="form-input" min="0" step="0.01" placeholder="Optional target amount">
            </div>

            <div class="form-group">
              <label for="campaignEndDate" class="form-label">End Date</label>
              <input type="date" id="campaignEndDate" class="form-input">
            </div>
          </div>

          <div class="form-group">
            <label for="campaignImage" class="form-label">Campaign Image URL</label>
            <input type="url" id="campaignImage" class="form-input" placeholder="https://example.com/image.jpg">
          </div>

          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="campaignFeatured">
              <span>Feature this campaign on donation page</span>
            </label>
          </div>

          <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
            <button type="button" class="btn btn-outline" onclick="closeCampaignModal()">Cancel</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">Create Campaign</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>

  <script>
    let allCampaigns = [];
    let currentUser = null;
    let editingCampaign = null;

    function signOut() {
      AuthModule.signOut();
    }

    async function loadCampaigns() {
      try {
        UIModule.showLoader('Loading campaigns...');
        
        const db = firebase.firestore();
        const snapshot = await db.collection('donation_campaigns')
          .orderBy('createdAt', 'desc')
          .get();

        allCampaigns = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));

        renderActiveCampaigns();
        renderPastCampaigns();

        UIModule.hideLoader();
      } catch (error) {
        UIModule.hideLoader();
        console.error('Error loading campaigns:', error);
        UIModule.showAlert('Error loading campaigns: ' + error.message, 'error');
      }
    }

    function renderActiveCampaigns() {
      const active = allCampaigns.filter(c => c.status === 'active');
      const container = document.getElementById('activeCampaigns');

      if (active.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 3rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🎯</div>
            <h3 style="margin-bottom: 0.5rem;">No Active Campaigns</h3>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Create your first campaign to start collecting targeted donations</p>
            <button class="btn btn-primary" onclick="openCampaignModal()">➕ Create Campaign</button>
          </div>
        `;
        return;
      }

      container.innerHTML = active.map(campaign => {
        const progress = campaign.goal ? (campaign.raised / campaign.goal) * 100 : 0;
        const hasEndDate = campaign.endDate;
        const daysLeft = hasEndDate ? Math.ceil((campaign.endDate.toDate() - new Date()) / (1000 * 60 * 60 * 24)) : null;
        
        return `
          <div class="card mb-4" style="border-left: 4px solid var(--color-primary);">
            <div style="display: flex; gap: 2rem; align-items: start;">
              ${campaign.imageUrl ? `
                <img src="${campaign.imageUrl}" alt="${campaign.title}" style="width: 150px; height: 150px; object-fit: cover; border-radius: var(--radius-md);">
              ` : ''}
              
              <div style="flex: 1;">
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                  <div>
                    <h3 style="margin: 0 0 0.5rem 0;">${campaign.title}</h3>
                    <p style="color: var(--text-secondary); margin: 0;">${campaign.description}</p>
                  </div>
                  ${campaign.featured ? '<span class="badge badge-primary">⭐ Featured</span>' : ''}
                </div>

                ${campaign.goal ? `
                  <div style="margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                      <span style="font-weight: 600;">GHS ${campaign.raised.toLocaleString()} raised</span>
                      <span style="color: var(--text-secondary);">Goal: GHS ${campaign.goal.toLocaleString()}</span>
                    </div>
                    <div class="progress-bar" style="height: 10px;">
                      <div style="width: ${Math.min(progress, 100)}%; height: 100%; background: var(--color-primary); border-radius: inherit;"></div>
                    </div>
                    <div style="font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.25rem;">
                      ${progress.toFixed(1)}% complete
                    </div>
                  </div>
                ` : `
                  <div style="margin-bottom: 1rem;">
                    <div style="font-size: 1.25rem; font-weight: 600; color: var(--color-primary);">
                      GHS ${campaign.raised.toLocaleString()} raised
                    </div>
                    <div style="font-size: 0.875rem; color: var(--text-secondary);">
                      ${campaign.donationCount || 0} donation(s)
                    </div>
                  </div>
                `}

                <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                  ${daysLeft !== null ? `
                    <span class="badge badge-${daysLeft > 7 ? 'info' : 'warning'}">
                      ${daysLeft > 0 ? `${daysLeft} days left` : 'Ended'}
                    </span>
                  ` : ''}
                  <span style="font-size: 0.875rem; color: var(--text-secondary);">
                    ${campaign.donationCount || 0} donations
                  </span>
                  
                  <div style="margin-left: auto; display: flex; gap: 0.5rem;">
                    <button class="btn btn-sm btn-outline" onclick='editCampaign(${JSON.stringify(campaign).replace(/'/g, "\\'")}'>Edit</button>
                    <button class="btn btn-sm btn-success" onclick="completeCampaign('${campaign.id}')">✅ Complete</button>
                    <button class="btn btn-sm btn-danger" onclick="cancelCampaign('${campaign.id}')">❌ Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderPastCampaigns() {
      const statusFilter = document.getElementById('statusFilter').value;
      let past = allCampaigns.filter(c => ['completed', 'cancelled'].includes(c.status));
      
      if (statusFilter) {
        past = past.filter(c => c.status === statusFilter);
      }

      const container = document.getElementById('pastCampaigns');

      if (past.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
            No past campaigns
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div style="overflow-x: auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Campaign</th>
                <th>Status</th>
                <th>Raised</th>
                <th>Goal</th>
                <th>Donations</th>
                <th>Created</th>
                <th>Ended</th>
              </tr>
            </thead>
            <tbody>
              ${past.map(c => `
                <tr>
                  <td>
                    <strong>${c.title}</strong>
                    ${c.featured ? '<span class="badge badge-primary ml-2">⭐</span>' : ''}
                  </td>
                  <td>
                    <span class="badge badge-${c.status === 'completed' ? 'success' : 'secondary'}">
                      ${c.status}
                    </span>
                  </td>
                  <td style="font-weight: 600;">GHS ${c.raised.toLocaleString()}</td>
                  <td>${c.goal ? `GHS ${c.goal.toLocaleString()}` : '-'}</td>
                  <td>${c.donationCount || 0}</td>
                  <td>${new Date(c.createdAt.toDate()).toLocaleDateString()}</td>
                  <td>${c.endedAt ? new Date(c.endedAt.toDate()).toLocaleDateString() : '-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    window.openCampaignModal = () => {
      editingCampaign = null;
      document.getElementById('modalTitle').textContent = 'Create New Campaign';
      document.getElementById('submitBtn').textContent = 'Create Campaign';
      document.getElementById('campaignId').value = '';
      document.getElementById('campaignTitle').value = '';
      document.getElementById('campaignDescription').value = '';
      document.getElementById('campaignGoal').value = '';
      document.getElementById('campaignEndDate').value = '';
      document.getElementById('campaignImage').value = '';
      document.getElementById('campaignFeatured').checked = false;
      document.getElementById('campaignModal').style.display = 'flex';
    };

    window.editCampaign = (campaign) => {
      editingCampaign = campaign;
      document.getElementById('modalTitle').textContent = 'Edit Campaign';
      document.getElementById('submitBtn').textContent = 'Save Changes';
      document.getElementById('campaignId').value = campaign.id;
      document.getElementById('campaignTitle').value = campaign.title;
      document.getElementById('campaignDescription').value = campaign.description;
      document.getElementById('campaignGoal').value = campaign.goal || '';
      document.getElementById('campaignEndDate').value = campaign.endDate ? 
        campaign.endDate.toDate().toISOString().split('T')[0] : '';
      document.getElementById('campaignImage').value = campaign.imageUrl || '';
      document.getElementById('campaignFeatured').checked = campaign.featured || false;
      document.getElementById('campaignModal').style.display = 'flex';
    };

    window.closeCampaignModal = () => {
      document.getElementById('campaignModal').style.display = 'none';
      editingCampaign = null;
    };

    window.submitCampaign = async (e) => {
      e.preventDefault();
      
      try {
        UIModule.showLoader(editingCampaign ? 'Updating campaign...' : 'Creating campaign...');
        
        const db = firebase.firestore();
        const campaignData = {
          title: document.getElementById('campaignTitle').value,
          description: document.getElementById('campaignDescription').value,
          goal: document.getElementById('campaignGoal').value ? 
            parseFloat(document.getElementById('campaignGoal').value) : null,
          endDate: document.getElementById('campaignEndDate').value ?
            firebase.firestore.Timestamp.fromDate(new Date(document.getElementById('campaignEndDate').value)) : null,
          imageUrl: document.getElementById('campaignImage').value || null,
          featured: document.getElementById('campaignFeatured').checked,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedBy: currentUser.uid,
          updatedByName: currentUser.displayName || currentUser.email
        };

        if (editingCampaign) {
          // Update existing campaign
          await db.collection('donation_campaigns').doc(editingCampaign.id).update(campaignData);
          UIModule.showAlert('Campaign updated successfully!', 'success');
        } else {
          // Create new campaign
          campaignData.status = 'active';
          campaignData.raised = 0;
          campaignData.donationCount = 0;
          campaignData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          campaignData.createdBy = currentUser.uid;
          campaignData.createdByName = currentUser.displayName || currentUser.email;
          
          await db.collection('donation_campaigns').add(campaignData);
          UIModule.showAlert('Campaign created successfully!', 'success');
        }

        UIModule.hideLoader();
        closeCampaignModal();
        loadCampaigns();
      } catch (error) {
        UIModule.hideLoader();
        console.error('Error saving campaign:', error);
        UIModule.showAlert('Error: ' + error.message, 'error');
      }
    };

    window.completeCampaign = async (campaignId) => {
      if (!confirm('Mark this campaign as completed? This cannot be undone.')) {
        return;
      }

      try {
        UIModule.showLoader('Completing campaign...');
        
        const db = firebase.firestore();
        await db.collection('donation_campaigns').doc(campaignId).update({
          status: 'completed',
          endedAt: firebase.firestore.FieldValue.serverTimestamp(),
          completedBy: currentUser.uid,
          completedByName: currentUser.displayName || currentUser.email
        });

        UIModule.hideLoader();
        UIModule.showAlert('Campaign marked as completed!', 'success');
        loadCampaigns();
      } catch (error) {
        UIModule.hideLoader();
        console.error('Error completing campaign:', error);
        UIModule.showAlert('Error: ' + error.message, 'error');
      }
    };

    window.cancelCampaign = async (campaignId) => {
      const reason = prompt('Enter reason for cancellation (optional):');
      if (reason === null) return; // User clicked cancel

      try {
        UIModule.showLoader('Cancelling campaign...');
        
        const db = firebase.firestore();
        await db.collection('donation_campaigns').doc(campaignId).update({
          status: 'cancelled',
          endedAt: firebase.firestore.FieldValue.serverTimestamp(),
          cancelledBy: currentUser.uid,
          cancelledByName: currentUser.displayName || currentUser.email,
          cancellationReason: reason || 'No reason provided'
        });

        UIModule.hideLoader();
        UIModule.showAlert('Campaign cancelled', 'success');
        loadCampaigns();
      } catch (error) {
        UIModule.hideLoader();
        console.error('Error cancelling campaign:', error);
        UIModule.showAlert('Error: ' + error.message, 'error');
      }
    };

    document.getElementById('statusFilter').addEventListener('change', renderPastCampaigns);

    AuthModule.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = '/membership.html';
        return;
      }

      currentUser = user;
      
      const db = firebase.firestore();
      const userDoc = await db.collection('users').doc(user.uid).get();
      const userData = userDoc.data();
      
      if (userData.role !== 'national_executive') {
        UIModule.showAlert('Access denied. National Executive role required.', 'error');
        setTimeout(() => window.location.href = '/member-dashboard.html', 2000);
        return;
      }

      loadCampaigns();
    });
  </script>
  <script src="/js/mobile-menu.js"></script>
</body>
</html>
